[workspace]
name = "exonBlocks"
version = "0.1.0"
description = "Map cell barcode + UMI-level read blocks to overlapping exons"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
"r-base" = "4.4.*"
"r-devtools" = "*"
"r-testthat" = ">=3.0.0"
"r-data.table" = ">=1.17.0"
"r-dplyr" = ">=1.1.4"
"r-tidyr" = ">=1.3.1"
"r-matrix" = ">=1.6.0"
"r-ggplot2" = "*"
"r-patchwork" = "*"
"r-future" = "*"
"r-scam" = "*"
"r-magrittr" = ">=2.0.3"
"r-biocmanager" = "*"
"bioconductor-genomicranges" = ">=1.55.0"
"bioconductor-iranges" = ">=2.40.0"
"bioconductor-genomicfeatures" = ">=1.55.0"
"bioconductor-genomeinfodb" = "*"
"bioconductor-genomeinfodbdata" = "*"
"bioconductor-glmgampoi" = "*"
"htslib" = "*"
"gcc_linux-64" = "*"
"cmake" = "*"
"r-seurat" = "5.*"
"r-signac" = ">=1.16.0"
"r-harmony" = "*"
"r-monocle3" = "*"
"radian" = "*"
"r-withr" = "*"
samtools = ">=1.23.1,<2"
bcftools = ">=1.23.1,<2"

[tasks]
install = "R -e 'devtools::install()'"
test = "R -e 'devtools::test()'"
doc = "R -e 'devtools::document()'"
check = "TMPDIR=/home/yu-wang/tmp _R_CHECK_FORCE_SUGGESTS_=false R -e 'devtools::check(args = \"--no-manual\")'"
